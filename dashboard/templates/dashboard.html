<!DOCTYPE html>
<html>
<head>
    <title>Load Balancer Dashboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
        }

        th, td {
            padding: 10px;
            border: 1px solid black;
        }

        th {
            background-color: #333;
            color: white;
        }

        .up {
            background-color: #b6fcb6;
        }

        .down {
            background-color: #fcb6b6;
        }
    </style>
</head>

<body>

<h2>Distributed Load Balancer Dashboard</h2>

<p><b>Algorithm:</b> <span id="algo">-</span></p>
<p><b>Uptime:</b> <span id="uptime">-</span> seconds</p>

<table>
    <thead>
        <tr>
            <th>Server</th>
            <th>Status</th>
            <th>Requests</th>
            <th>Failures</th>
            <th>Avg Response Time (s)</th>
        </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
</table>

<script>
async function fetchData() {
    try {
        const response = await fetch('http://localhost:5000/metrics');
        const data = await response.json();

        // Update global info
        document.getElementById("algo").innerText = data.algorithm;
        document.getElementById("uptime").innerText = data.uptime;

        const table = document.getElementById("table-body");
        table.innerHTML = "";

        const servers = data.servers;

        // Handle empty case
        if (Object.keys(servers).length === 0) {
            table.innerHTML = "<tr><td colspan='5'>No active servers</td></tr>";
            return;
        }

        for (const server in servers) {
            const stats = servers[server];

            const row = document.createElement("tr");

            // Status logic
            const status = stats.status;
            const statusClass = status === "UP" ? "up" : "down";

            row.className = statusClass;

            row.innerHTML = `
                <td>${server}</td>
                <td>${status}</td>
                <td>${stats.requests}</td>
                <td>${stats.failures}</td>
                <td>${stats.avg_response_time}</td>
            `;

            table.appendChild(row);
        }

    } catch (error) {
        console.error("Error fetching data:", error);
    }
}

// Refresh every 2 seconds
setInterval(fetchData, 2000);

// Initial load
fetchData();
</script>

</body>
</html>
