version: '3'

services:

  backend1:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5001:5000"

  backend2:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5002:5000"

  backend3:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5003:5000"

  load_balancer:
    build:
      context: .
      dockerfile: Dockerfile.lb
    ports:
      - "5000:5000"
    depends_on:
      - backend1
      - backend2
      - backend3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "7000:7000"
    depends_on:
      - load_balancer

  locust:
    image: locustio/locust
    ports:
      - "8089:8089"
    volumes:
      - ./client:/mnt/locust
    environment:
      - LOCUST_HOST=http://load_balancer:5000
    command: -f /mnt/locust/locustfile.py
    depends_on:
      - load_balancer